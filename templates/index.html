<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip01 Downloader</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body>
  <!-- Logo Section -->
  <div class="logo-container">
    <img src="{{ url_for('static', filename='assets/01.png') }}" alt="Clip01 Logo" class="logo">
  </div>

  <!-- Platforms Selector -->
  <div class="platforms">
    <div class="platform active" data-platform="youtube">YouTube</div>
    <div class="platform" data-platform="tiktok">TikTok</div>
    <div class="platform" data-platform="instagram">Instagram</div>
    <div class="platform" data-platform="facebook">Facebook</div>
  </div>

<!-- i'd take away the pain, i'd give u everything -->

  <!-- Format Selector -->
  <div class="format-selector">
    <div class="format active" data-format="mp4">MP4</div>
    <div class="format" data-format="mp3">MP3</div>
  </div>

  <!-- Quality Selector -->
  <div class="quality-selector">
    <div class="quality active" data-quality="high">High</div>
    <div class="quality" data-quality="medium">Medium</div>
    <div class="quality" data-quality="low">Low</div>
  </div>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text" class="search-bar" placeholder="Paste video URL here">
    <button class="search-button">Download</button>
  </div>
</body>
</html>
